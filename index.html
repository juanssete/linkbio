<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta de presentación</title>
    <link rel="icon" type="image/jpeg" href="juansete.jpg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="bg-energy"></div>

    <div class="main-card">
        <div class="corner-light tl"></div>
        <div class="corner-light tr"></div>

        <header class="profile-section">
            <div class="avatar-container">
                <img src="juansete.jpg" alt="Juansete" class="avatar">
                <div class="energy-ring ring-1"></div>
                <div class="energy-ring ring-2"></div>
            </div>
            <h1 class="neon-text">JUANSETE</h1>
            <span class="badge">CHALLENGER CON ZAC, HIERRO CON LOS DEMÁS CAMPEONES</span>
        </header>

        <div class="video-section">
            <div class="video-container">
    <iframe id="yt-player" src="" frameborder="0" allowfullscreen></iframe>
</div>

        <div class="action-links">
            <a href="https://twitch.tv/juanssete" class="btn-animate twitch" target="_blank">
                <div class="laser-shine"></div>
                <i class="fab fa-twitch"></i>
                <span>En Vivo en Twitch</span>
            </a>
            <a href="https://www.instagram.com/juanssete/" class="btn-animate instagram" target="_blank">
                <div class="laser-shine"></div>
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>
            <a href="https://www.tiktok.com/@juanssete" class="btn-animate tiktok" target="_blank">
                <div class="laser-shine"></div>
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
            </a>
            <a href="https://whatsapp.com/channel/0029VbCBeFoKbYMV6CZqwu2y" class="btn-animate whatsapp" target="_blank">
                <div class="laser-shine"></div>
                <i class="fab fa-whatsapp"></i>
                <span>Canal de difusión</span>
            </a>
        

            <a href="https://www.facebook.com/Juanseteoficial" target="_blank" class="btn-animate facebook">
                <div class="laser-shine"></div>
                <i class="fab fa-facebook"></i>
                <span>FACEBOOK</span>
            </a>

           
            <a href="https://kick.com/juanssete" target="_blank" class="btn-animate kick">
                <div class="laser-shine"></div>
                <i class="fas fa-gamepad"></i>
                <span>KICK</span>
            </a>

           
            <a href="mailto:juancesete@gmail.com?subject=Contacto" class="btn-animate correo">
                <div class="laser-shine"></div>
                <i class="fas fa-envelope"></i>
                <span>CORREO DE CONTACTO</span>
            </a>
<script src="script.js"></script>
</body>
</html>
